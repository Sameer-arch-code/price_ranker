<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Camera Capture</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 1rem; }
    .wrap { width: 100%; max-width: 720px; }
    h2 { font-size: 18px; font-weight: 500; margin-bottom: 1rem; color: #111; }

    .video-box {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #e8e8e8;
      border-radius: 12px;
      border: 1px solid #ddd;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-box video, .video-box canvas {
      width: 100%; height: 100%; object-fit: cover; display: none;
    }
    .placeholder {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; color: #999; font-size: 14px;
    }
    .placeholder svg { width: 48px; height: 48px; stroke: #bbb; }

    .btn-row { display: flex; gap: 10px; margin-top: 12px; }
    button {
      flex: 1; padding: 10px 0; border-radius: 8px;
      border: 1px solid #ccc; background: white; color: #111;
      font-size: 14px; cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: #f0f0f0; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    button.primary { background: #dbeafe; border-color: #93c5fd; color: #1d4ed8; }
    button.primary:hover { background: #bfdbfe; }
    button.green { background: #dcfce7; border-color: #86efac; color: #166534; }
    button.green:hover { background: #bbf7d0; }

    .status { font-size: 13px; color: #666; margin-top: 10px; min-height: 18px; }
    .status.err { color: #dc2626; }

    .images-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }
    .img-box { display: none; }
    .img-box img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 10px; border: 1px solid #ddd; }
    .img-label { font-size: 12px; color: #888; margin-bottom: 6px; }

    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid #93c5fd; border-top-color: #1d4ed8;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 6px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrap">
  <h2>📸 Camera → Backend</h2>

  <div class="video-box" id="videoBox">
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span>Camera preview</span>
    </div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
  </div>

  <div class="btn-row">
    <button class="primary" id="startBtn" onclick="startCamera()">▶ Start camera</button>
    <button id="captureBtn" onclick="capturePhoto()" disabled>⬤ Capture</button>
    <button id="retakeBtn" onclick="retake()" style="display:none">↺ Retake</button>
    <button class="green" onclick="sendToBackend()" id="sendBtn" style="display:none">↑ Send</button>
  </div>

  <p class="status" id="status">Press "Start camera" to begin.</p>

  <div class="images-row">
    <div class="img-box" id="result-box">
      <p class="img-label">📷 Captured</p>
      <img id="resultImg" alt="Captured photo" />
    </div>
    <div class="img-box" id="output-box">
      <p class="img-label">🖥️ Result</p>
      <img id="outputImg" alt="Processed result" />
    </div>
  </div>
</div>

<script>
  const BACKEND_URL = 'https://hobby-happens-invitations-games.trycloudflare.com/process';

  let stream = null;
  let capturedDataUrl = null;

  const video       = document.getElementById('video');
  const canvas      = document.getElementById('canvas');
  const placeholder = document.getElementById('placeholder');
  const status      = document.getElementById('status');
  const startBtn    = document.getElementById('startBtn');
  const captureBtn  = document.getElementById('captureBtn');
  const retakeBtn   = document.getElementById('retakeBtn');
  const sendBtn     = document.getElementById('sendBtn');
  const resultBox   = document.getElementById('result-box');
  const resultImg   = document.getElementById('resultImg');
  const outputBox   = document.getElementById('output-box');
  const outputImg   = document.getElementById('outputImg');

  function setStatus(msg, isErr) {
    status.innerHTML = msg;
    status.className = 'status' + (isErr ? ' err' : '');
  }

  async function startCamera() {
    startBtn.disabled = true;
    setStatus('Starting camera...');

    if (stream) stream.getTracks().forEach(t => t.stop());

    const constraints = [
      { video: { facingMode: { exact: 'environment' }, width: { ideal: 1280 } } },
      { video: { facingMode: 'environment', width: { ideal: 1280 } } },
      { video: true }
    ];

    let started = false;
    for (const c of constraints) {
      try {
        stream = await navigator.mediaDevices.getUserMedia(c);
        started = true;
        break;
      } catch (e) {}
    }

    if (!started) {
      setStatus('Could not access camera. Please allow camera permission and try again.', true);
      startBtn.disabled = false;
      return;
    }

    video.srcObject = stream;
    video.style.display = 'block';
    canvas.style.display = 'none';
    placeholder.style.display = 'none';
    captureBtn.disabled = false;
    retakeBtn.style.display = 'none';
    sendBtn.style.display = 'none';
    resultBox.style.display = 'none';
    outputBox.style.display = 'none';
    setStatus('Camera live. Press "Capture" when ready.');
  }

  function capturePhoto() {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    capturedDataUrl = canvas.toDataURL('image/jpeg', 0.92);

    video.style.display = 'none';
    canvas.style.display = 'block';
    captureBtn.disabled = true;
    retakeBtn.style.display = 'flex';
    sendBtn.style.display = 'flex';

    resultImg.src = capturedDataUrl;
    resultBox.style.display = 'block';
    outputBox.style.display = 'none';
    setStatus('Photo captured. Press "Send" to process.');
  }

  function retake() {
    capturedDataUrl = null;
    resultBox.style.display = 'none';
    outputBox.style.display = 'none';
    retakeBtn.style.display = 'none';
    sendBtn.style.display = 'none';
    captureBtn.disabled = false;
    video.style.display = 'block';
    canvas.style.display = 'none';
    setStatus('Camera live. Press "Capture" when ready.');
  }

  async function sendToBackend() {
    if (!capturedDataUrl) return;
    sendBtn.disabled = true;
    setStatus('<span class="spinner"></span>Sending to backend, please wait...');
    outputBox.style.display = 'none';

    try {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: capturedDataUrl })
      });

      if (!res.ok) throw new Error('Server returned ' + res.status);
      const json = await res.json();
      if (json.error) throw new Error(json.error);

      outputImg.src = json.image;
      outputBox.style.display = 'block';
      resultBox.style.display = 'none';
      setStatus('✅ Done!');
    } catch (e) {
      setStatus('❌ Error: ' + e.message, true);
    }

    sendBtn.disabled = false;
  }
</script>
</body>
</html>
