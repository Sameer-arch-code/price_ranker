<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Price Ranker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background: #111; }

    .video-box {
      position: fixed; inset: 0; background: #111;
      display: flex; align-items: center; justify-content: center;
    }
    .video-box video, .video-box canvas {
  width: 100%; height: 100%; object-fit: cover; display: none;
}
.video-box img {
  width: 100%; height: 100%; object-fit: contain; display: none;
}
    /* local image preview fills screen with contain so nothing is cropped */
    #localPreview {
      position: fixed; inset: 0; display: none;
      align-items: center; justify-content: center; background: #111; z-index: 5;
    }
    #localPreview img {
      max-width: 100%; max-height: 100%; object-fit: contain;
    }

    .placeholder {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; color: #666; font-size: 14px;
    }
    .placeholder svg { width: 48px; height: 48px; stroke: #444; }

    #focusRing {
      position: fixed; width: 64px; height: 64px;
      border: 2px solid #facc15; border-radius: 4px;
      pointer-events: none; z-index: 30;
      display: none; transform: translate(-50%, -50%);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
      animation: focusPulse 0.35s ease-out forwards;
    }
    @keyframes focusPulse {
      0%   { opacity: 1; width: 80px; height: 80px; }
      100% { opacity: 1; width: 64px; height: 64px; }
    }

    .header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 14px 16px 0;
      font-size: 16px; font-weight: 500; color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      z-index: 20; pointer-events: none;
    }

    #zoomBar {
      position: fixed; right: 16px; top: 50%; transform: translateY(-50%);
      display: none; flex-direction: column; align-items: center; gap: 8px; z-index: 20;
    }
    #zoomSlider {
      -webkit-appearance: none; appearance: none;
      writing-mode: vertical-lr; direction: rtl;
      width: 4px; height: 160px; border-radius: 2px;
      background: rgba(255,255,255,0.25); outline: none; cursor: pointer;
    }
    #zoomSlider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px;
      border-radius: 50%; background: #fff; cursor: pointer;
      box-shadow: 0 1px 5px rgba(0,0,0,0.5);
    }
    #zoomLabel {
      color: rgba(255,255,255,0.85); font-size: 12px;
      text-align: center; text-shadow: 0 1px 3px rgba(0,0,0,0.7);
      letter-spacing: 0.02em;
    }

    #qualityRow {
      position: fixed; top: 44px; right: 14px;
      display: none; align-items: center; gap: 6px; z-index: 20;
    }
    #qualityRow label { color: rgba(255,255,255,0.75); font-size: 12px; }
    #qualityToggle {
      display: flex; border-radius: 12px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }
    #qualityToggle button {
      padding: 4px 10px; font-size: 11px; border-radius: 0; border: none;
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6);
    }
    #qualityToggle button.active {
      background: rgba(255,255,255,0.85); color: #111;
    }

    /* drag-over highlight */
    body.dragover .video-box,
    body.dragover #localPreview { outline: 2px dashed rgba(250,204,21,0.7); }

    .status {
      position: fixed; bottom: 88px; left: 0; right: 0; text-align: center;
      font-size: 13px; color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 3px rgba(0,0,0,0.7);
      z-index: 20; pointer-events: none;
    }
    .status.err { color: #f87171; }

    .btn-row {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 20;
    }
    button {
      padding: 9px 22px; border-radius: 20px; border: none;
      background: rgba(255,255,255,0.85); color: #111;
      font-size: 14px; cursor: pointer; transition: background 0.15s;
      white-space: nowrap; backdrop-filter: blur(6px);
    }
    button:hover { background: rgba(255,255,255,1); }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    button.primary { background: rgba(219,234,254,0.9); color: #1d4ed8; }
    button.primary:hover { background: rgba(191,219,254,1); }
    button.green { background: rgba(220,252,231,0.9); color: #166534; }
    button.green:hover { background: rgba(187,247,208,1); }
    button.amber { background: rgba(254,243,199,0.9); color: #92400e; }
    button.amber:hover { background: rgba(253,230,138,1); }

    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 6px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #tapHint {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.4); font-size: 12px; pointer-events: none;
      z-index: 15; display: none; text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }

    /* hidden file input */
    #fileInput { display: none; }
  </style>
</head>
<body>

  <div class="video-box" id="videoBox">
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span>Camera preview</span>
    </div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <img id="outputImg" alt="Result" />
  </div>

  <!-- local image preview -->
  <div id="localPreview"><img id="localImg" alt="Local image" /></div>

  <div id="focusRing"></div>
  <div id="tapHint">Tap to focus</div>
  <input type="file" id="fileInput" accept="image/*" onchange="handleFileInput(this)">

  <div class="header">Price Ranker</div>

  <div id="qualityRow">
    <label>Quality</label>
    <div id="qualityToggle">
      <button id="qHD" onclick="setQuality('hd')">HD</button>
      <button id="qMax" class="active" onclick="setQuality('max')">MAX</button>
    </div>
  </div>

  <div id="zoomBar">
    <span id="zoomLabel">1×</span>
    <input type="range" id="zoomSlider" min="1" max="5" step="0.05" value="1" oninput="applyZoom(parseFloat(this.value))">
  </div>

  <p class="status" id="status">Press "Start camera" or upload an image.</p>

  <div class="btn-row" id="btnRow">
    <button class="primary" id="startBtn" onclick="startCamera()">Start camera</button>
    <button class="amber"   id="uploadBtn" onclick="document.getElementById('fileInput').click()">Upload image</button>
    <button id="captureBtn" onclick="capturePhoto()" disabled style="display:none">Capture</button>
    <button id="retakeBtn"  onclick="retake()"        style="display:none">Retake</button>
    <button class="green"   id="sendBtn" onclick="sendToBackend()" style="display:none">Send</button>
  </div>

<script>
  const BACKEND_URL = 'https://beth-madonna-procurement-thumbs.trycloudflare.com/process';

  let stream = null;
  let capturedDataUrl = null;
  let currentZoom = 1;
  let minZoom = 1, maxZoom = 5;
  let supportsZoom = false;
  let quality = 'max';
  let focusTimeout = null;
  let hintTimeout = null;
  let mode = 'idle'; // 'idle' | 'camera' | 'local'

  const video        = document.getElementById('video');
  const canvas       = document.getElementById('canvas');
  const placeholder  = document.getElementById('placeholder');
  const outputImg    = document.getElementById('outputImg');
  const localPreview = document.getElementById('localPreview');
  const localImg     = document.getElementById('localImg');
  const status       = document.getElementById('status');
  const startBtn     = document.getElementById('startBtn');
  const uploadBtn    = document.getElementById('uploadBtn');
  const captureBtn   = document.getElementById('captureBtn');
  const retakeBtn    = document.getElementById('retakeBtn');
  const sendBtn      = document.getElementById('sendBtn');
  const zoomBar      = document.getElementById('zoomBar');
  const zoomSlider   = document.getElementById('zoomSlider');
  const zoomLabel    = document.getElementById('zoomLabel');
  const focusRing    = document.getElementById('focusRing');
  const qualityRow   = document.getElementById('qualityRow');
  const tapHint      = document.getElementById('tapHint');

  function setStatus(msg, isErr) {
    status.innerHTML = msg;
    status.className = 'status' + (isErr ? ' err' : '');
  }

  function showOnly(el) {
    [video, canvas, outputImg, placeholder].forEach(e => e.style.display = 'none');
    localPreview.style.display = 'none';
    if (el === localPreview) { localPreview.style.display = 'flex'; return; }
    if (el) el.style.display = 'block';
  }

  // ── Quality ────────────────────────────────────────────────
  function setQuality(q) {
    quality = q;
    document.getElementById('qHD').classList.toggle('active', q === 'hd');
    document.getElementById('qMax').classList.toggle('active', q === 'max');
  }

  // ── Zoom ───────────────────────────────────────────────────
  function applyZoom(val) {
    currentZoom = Math.max(minZoom, Math.min(maxZoom, val));
    zoomSlider.value = currentZoom;
    zoomLabel.textContent = currentZoom.toFixed(1).replace(/\.0$/, '') + '×';
    if (!stream) return;
    const [track] = stream.getVideoTracks();
    if (supportsZoom) track.applyConstraints({ advanced: [{ zoom: currentZoom }] }).catch(() => {});
  }

  // ── Tap-to-focus ───────────────────────────────────────────
  function showFocusRing(x, y) {
    focusRing.style.left = x + 'px';
    focusRing.style.top  = y + 'px';
    focusRing.style.display = 'block';
    focusRing.style.animation = 'none';
    void focusRing.offsetWidth;
    focusRing.style.animation = '';
    clearTimeout(focusTimeout);
    focusTimeout = setTimeout(() => { focusRing.style.display = 'none'; }, 1800);
  }

  async function tapFocus(e) {
    if (mode !== 'camera' || sendBtn.style.display !== 'none') return;
    const rect = video.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    showFocusRing(clientX, clientY);
    tapHint.style.display = 'none';
    if (!stream) return;
    const [track] = stream.getVideoTracks();
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if (caps.pointsOfInterest || caps.focusMode) {
      const x = (clientX - rect.left) / rect.width;
      const y = (clientY - rect.top)  / rect.height;
      const adv = {};
      if (caps.pointsOfInterest) adv.pointsOfInterest = [{ x, y }];
      if (caps.focusMode) {
        if (caps.focusMode.includes('single-shot')) adv.focusMode = 'single-shot';
        else if (caps.focusMode.includes('manual')) adv.focusMode = 'manual';
      }
      try { await track.applyConstraints({ advanced: [adv] }); } catch (_) {}
    }
  }

  video.addEventListener('click',      tapFocus);
  video.addEventListener('touchstart', tapFocus, { passive: true });

  // ── Drag & drop ────────────────────────────────────────────
  document.addEventListener('dragover',  e => { e.preventDefault(); document.body.classList.add('dragover'); });
  document.addEventListener('dragleave', e => { if (!e.relatedTarget) document.body.classList.remove('dragover'); });
  document.addEventListener('drop', e => {
    e.preventDefault();
    document.body.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadLocalFile(file);
  });

  // ── Local file handling ────────────────────────────────────
  function handleFileInput(input) {
    const file = input.files[0];
    if (file) loadLocalFile(file);
    input.value = ''; // reset so same file can be re-selected
  }

  function loadLocalFile(file) {
    // Stop any active camera
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    mode = 'local';

    const reader = new FileReader();
    reader.onload = evt => {
      capturedDataUrl = evt.target.result;
      localImg.src = capturedDataUrl;
      showOnly(localPreview);

      // Hide camera controls, show send/retake
      startBtn.style.display   = 'none';
      uploadBtn.style.display  = 'none';
      captureBtn.style.display = 'none';
      retakeBtn.style.display  = 'flex';
      sendBtn.style.display    = 'flex';
      zoomBar.style.display    = 'none';
      qualityRow.style.display = 'none';
      tapHint.style.display    = 'none';

      const kb = (file.size / 1024).toFixed(0);
      setStatus(`"${file.name}" loaded (${kb} KB) · Press "Send" to process.`);
    };
    reader.readAsDataURL(file);
  }

  // ── Camera start ───────────────────────────────────────────
  async function startCamera() {
    startBtn.disabled = true;
    uploadBtn.disabled = true;
    setStatus('Starting camera…');
    if (stream) stream.getTracks().forEach(t => t.stop());
    mode = 'camera';

    const constraints = [
      { video: { facingMode: { exact: 'environment' }, width: { ideal: 4096 }, height: { ideal: 3072 } } },
      { video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } },
      { video: true }
    ];

    let started = false;
    for (const c of constraints) {
      try { stream = await navigator.mediaDevices.getUserMedia(c); started = true; break; } catch (e) {}
    }

    if (!started) {
      setStatus('Could not access camera. Please allow permission and try again.', true);
      startBtn.disabled = false;
      uploadBtn.disabled = false;
      mode = 'idle';
      return;
    }

    video.srcObject = stream;
    showOnly(video);
    startBtn.style.display   = 'none';
    uploadBtn.style.display  = 'none';
    captureBtn.style.display = 'flex';
    captureBtn.disabled = false;
    retakeBtn.style.display = 'none';
    sendBtn.style.display   = 'none';

    // Probe zoom
    const [track] = stream.getVideoTracks();
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if (caps.zoom) {
      supportsZoom = true;
      minZoom = caps.zoom.min ?? 1;
      maxZoom = caps.zoom.max ?? 5;
      zoomSlider.min = minZoom; zoomSlider.max = maxZoom;
      zoomSlider.step = 0.05; zoomSlider.value = minZoom;
      currentZoom = minZoom;
      zoomLabel.textContent = minZoom + '×';
      zoomBar.style.display = 'flex';
    } else {
      zoomBar.style.display = 'none';
    }

    qualityRow.style.display = 'flex';
    tapHint.style.display = 'block';
    clearTimeout(hintTimeout);
    hintTimeout = setTimeout(() => { tapHint.style.display = 'none'; }, 2800);
    setStatus('Tap to focus · Capture when ready.');
  }

  // ── Capture ────────────────────────────────────────────────
  function capturePhoto() {
    const vw = video.videoWidth, vh = video.videoHeight;
    let w = vw, h = vh;
    if (quality === 'hd') {
      const scale = Math.min(1, 1920 / vw);
      w = Math.round(vw * scale); h = Math.round(vh * scale);
    }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(video, 0, 0, w, h);
    capturedDataUrl = canvas.toDataURL('image/jpeg', quality === 'max' ? 0.98 : 0.88);

    showOnly(canvas);
    captureBtn.disabled = true;
    retakeBtn.style.display = 'flex';
    sendBtn.style.display   = 'flex';
    zoomBar.style.display   = 'none';
    qualityRow.style.display = 'none';
    tapHint.style.display   = 'none';
    clearTimeout(hintTimeout);
    const mp = ((w * h) / 1e6).toFixed(1);
    setStatus(`Captured ${w}×${h} (${mp} MP) · Press "Send" to process.`);
  }

  // ── Retake / back ──────────────────────────────────────────
  function retake() {
    capturedDataUrl = null;

    if (mode === 'local') {
      // go back to idle start screen
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      mode = 'idle';
      showOnly(placeholder);
      startBtn.style.display   = 'flex';
      uploadBtn.style.display  = 'flex';
      startBtn.disabled = false;
      uploadBtn.disabled = false;
      captureBtn.style.display = 'none';
      retakeBtn.style.display  = 'none';
      sendBtn.style.display    = 'none';
      zoomBar.style.display    = 'none';
      qualityRow.style.display = 'none';
      setStatus('Press "Start camera" or upload an image.');
      return;
    }

    // camera mode: back to live preview
    showOnly(video);
    captureBtn.disabled = false;
    retakeBtn.style.display = 'none';
    sendBtn.style.display   = 'none';
    if (supportsZoom) zoomBar.style.display = 'flex';
    qualityRow.style.display = 'flex';
    tapHint.style.display = 'block';
    clearTimeout(hintTimeout);
    hintTimeout = setTimeout(() => { tapHint.style.display = 'none'; }, 2800);
    setStatus('Tap to focus · Capture when ready.');
  }

  // ── Send ───────────────────────────────────────────────────
  async function sendToBackend() {
    if (!capturedDataUrl) return;
    sendBtn.disabled = true;
    retakeBtn.disabled = true;
    setStatus('<span class="spinner"></span>Processing, please wait…');

    try {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: capturedDataUrl })
      });
      if (!res.ok) throw new Error('Server returned ' + res.status);
      const json = await res.json();
      if (json.error) throw new Error(json.error);

      outputImg.src = json.image;
      showOnly(outputImg);
      retakeBtn.style.display = 'flex';
      sendBtn.style.display   = 'none';
      setStatus('Done.');
    } catch (e) {
      setStatus('Error: ' + e.message, true);
      showOnly(mode === 'local' ? localPreview : canvas);
    }

    sendBtn.disabled = false;
    retakeBtn.disabled = false;
  }
</script>
</body>
</html>
